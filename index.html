<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Tic-tac-toe</title>
</head>

<body>
    <h1 class="title">Крестики нолики</h1>
    <div class="game">
        <div class="game__wrapper">
            <div class="game__board">
                <div class="game__board-cell" data-cell-index="0"></div>
                <div class="game__board-cell" data-cell-index="1"></div>
                <div class="game__board-cell" data-cell-index="2"></div>
                <div class="game__board-cell" data-cell-index="3"></div>
                <div class="game__board-cell" data-cell-index="4"></div>
                <div class="game__board-cell" data-cell-index="5"></div>
                <div class="game__board-cell" data-cell-index="6"></div>
                <div class="game__board-cell" data-cell-index="7"></div>
                <div class="game__board-cell" data-cell-index="8"></div>
            </div>
            <div class="button__wrapper">
                <button class="game__button-start">СНАЧАЛА</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
